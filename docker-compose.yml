version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: dshow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dshow}
      MYSQL_USER: ${MYSQL_USER:-dshow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dshow_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:

